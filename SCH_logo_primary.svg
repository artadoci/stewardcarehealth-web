<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 96" width="370" height="96">
  <title>Steward Care Health — Primary Logo</title>
  <!-- Elder hand (navy) -->
  <rect x="10" y="56" width="42" height="20" rx="8" fill="#1B2B4B"/>
  <rect x="12" y="28" width="8" height="32" rx="4" fill="#1B2B4B"/>
  <rect x="22" y="20" width="8" height="40" rx="4" fill="#1B2B4B"/>
  <rect x="32" y="18" width="8" height="42" rx="4" fill="#1B2B4B"/>
  <rect x="42" y="24" width="8" height="36" rx="4" fill="#1B2B4B"/>
  <rect x="3" y="52" width="10" height="24" rx="5" transform="rotate(-28 8 64)" fill="#1B2B4B"/>
  <!-- Young hand (gold) -->
  <rect x="38" y="60" width="38" height="18" rx="7" fill="#C4963A"/>
  <rect x="40" y="36" width="7" height="28" rx="3.5" fill="#C4963A"/>
  <rect x="49" y="28" width="7" height="36" rx="3.5" fill="#C4963A"/>
  <rect x="58" y="26" width="7" height="38" rx="3.5" fill="#C4963A"/>
  <rect x="67" y="30" width="7" height="34" rx="3.5" fill="#C4963A"/>
  <rect x="36" y="58" width="9" height="20" rx="4.5" transform="rotate(22 40 68)" fill="#C4963A"/>
  <!-- Overlap glow -->
  <rect x="40" y="60" width="12" height="18" rx="5" fill="#E8C96A" opacity="0.55"/>
  <!-- Divider -->
  <rect x="100" y="18" width="1.5" height="58" rx="0.75" fill="#D4CAC0"/>
  <!-- Wordmark -->
  <text x="114" y="38" font-family="'Arial Black',Arial,Helvetica,sans-serif" font-size="16.5" font-weight="900" fill="#1B2B4B" letter-spacing="0.4">STEWARD CARE</text>
  <text x="114" y="59" font-family="'Arial Black',Arial,Helvetica,sans-serif" font-size="16.5" font-weight="900" fill="#C4963A" letter-spacing="0.4">HEALTH</text>
  <text x="115" y="76" font-family="Arial,Helvetica,sans-serif" font-size="7.5" fill="#5A739A" letter-spacing="2.2">RELATIONSHIP-FIRST HOME CARE</text>
